<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系统健康 · EduKnowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0e1a;
      --bg-card: rgba(15, 25, 45, 0.7);
      --bg-input: rgba(5, 10, 20, 0.8);
      --text-primary: #ffffff;
      --text-secondary: #8b9dc3;
      --accent-cyan: #00d4ff;
      --accent-blue: #0099ff;
      --border-glow: rgba(0, 212, 255, 0.4);
      --glass-border: rgba(255, 255, 255, 0.1);
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @keyframes gridScan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.1); }
      70% { transform: scale(1); }
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid Background */
    .grid-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .grid-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
      animation: gridScan 8s linear infinite;
      opacity: 0.5;
    }

    /* Container */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
      animation: slideIn 0.6s ease-out;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      color: var(--text-primary);
      transform: translateX(-5px);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      margin: 0 0 16px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--text-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .description {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.7;
    }

    /* Overall Status */
    .overall-status {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 32px;
      text-align: center;
      animation: slideIn 0.6s ease-out 0.1s backwards;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .overall-status::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0, 212, 255, 0.1), transparent);
      pointer-events: none;
    }

    .status-icon {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      animation: heartbeat 2s ease-in-out infinite;
    }

    .status-icon.ok {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
      border: 2px solid var(--success);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
    }

    .status-icon.error {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.05));
      border: 2px solid var(--error);
      box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
    }

    .status-icon.warning {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.05));
      border: 2px solid var(--warning);
      box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
    }

    .status-icon::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px dashed;
      animation: spin 10s linear infinite;
    }

    .status-icon.ok::before { border-color: rgba(16, 185, 129, 0.3); }
    .status-icon.error::before { border-color: rgba(239, 68, 68, 0.3); }
    .status-icon.warning::before { border-color: rgba(245, 158, 11, 0.3); }

    .status-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .status-text.ok { color: var(--success); }
    .status-text.error { color: var(--error); }
    .status-text.warning { color: var(--warning); }

    .status-time {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Services Grid */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 28px;
      animation: slideIn 0.6s ease-out backwards;
      backdrop-filter: blur(20px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card:nth-child(1) { animation-delay: 0.2s; }
    .service-card:nth-child(2) { animation-delay: 0.3s; }
    .service-card:nth-child(3) { animation-delay: 0.4s; }

    .service-card:hover {
      border-color: var(--border-glow);
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .service-card.ok { border-left: 4px solid var(--success); }
    .service-card.error { border-left: 4px solid var(--error); }
    .service-card.warning { border-left: 4px solid var(--warning); }

    .service-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
    }

    .service-card.ok .service-icon {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
    }

    .service-card.error .service-icon {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .service-card.warning .service-icon {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .service-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .service-status {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .service-status.ok { color: var(--success); }
    .service-status.error { color: var(--error); }
    .service-status.warning { color: var(--warning); }

    .service-details {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 16px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.6;
    }

    .service-details .label {
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .service-details .value {
      color: var(--text-primary);
    }

    .service-details .error-msg {
      color: var(--error);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--glass-border);
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: slideIn 0.6s ease-out 0.5s backwards;
    }

    button {
      padding: 14px 32px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      color: var(--bg-dark);
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
    }

    button.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: var(--bg-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    button.secondary .loading {
      border-color: rgba(255, 255, 255, 0.3);
      border-top-color: var(--accent-cyan);
    }

    /* Raw JSON */
    .raw-section {
      margin-top: 32px;
      animation: slideIn 0.6s ease-out 0.6s backwards;
    }

    .raw-toggle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      transition: color 0.3s ease;
    }

    .raw-toggle:hover {
      color: var(--accent-cyan);
    }

    .raw-toggle .arrow {
      transition: transform 0.3s ease;
    }

    .raw-toggle.open .arrow {
      transform: rotate(90deg);
    }

    pre {
      background: var(--bg-input);
      padding: 20px;
      border-radius: 16px;
      overflow: auto;
      font-size: 0.85rem;
      color: var(--text-secondary);
      border: 1px solid var(--glass-border);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.6;
      display: none;
    }

    pre.visible {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    pre::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    pre::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    pre::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 3px;
    }

    /* Status Bar */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple), var(--accent-cyan));
      background-size: 200% 100%;
      animation: gradientMove 3s linear infinite;
      z-index: 1000;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container { padding: 24px 16px 60px; }
      h1 { font-size: 1.5rem; }
      .overall-status { padding: 28px 20px; }
      .status-icon { width: 80px; height: 80px; font-size: 2.5rem; }
      .status-text { font-size: 1.5rem; }
      .services-grid { grid-template-columns: 1fr; }
      button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>

  <div class="container">
    <div class="header">
      <a href="/front/index.html" class="back-link">← 返回首页</a>
      <h1>系统健康监控</h1>
      <p class="description">实时监控 MongoDB、Milvus 向量数据库和 MinIO 存储服务状态</p>
    </div>

    <div class="overall-status" id="overallStatus">
      <div class="status-icon" id="statusIcon">⏳</div>
      <div class="status-text" id="statusText">检测中...</div>
      <div class="status-time" id="statusTime">--</div>
    </div>

    <div class="services-grid" id="servicesGrid">
      <!-- Services will be rendered here -->
    </div>

    <div class="actions">
      <button type="button" id="btnRefresh">
        <span>🔄</span> 刷新状态
      </button>
      <button type="button" class="secondary" id="btnAutoRefresh">
        <span>▶️</span> 自动刷新
      </button>
    </div>

    <div class="raw-section">
      <div class="raw-toggle" id="rawToggle">
        <span class="arrow">▶</span>
        <span>查看原始 JSON 数据</span>
      </div>
      <pre id="rawJson"></pre>
    </div>
  </div>

  <div class="status-bar"></div>

  <script>
    let autoRefreshInterval = null;

    function getServiceIcon(name) {
      const icons = {
        mongodb: '🍃',
        milvus: '🔍',
        minio: '🪣'
      };
      return icons[name.toLowerCase()] || '🔧';
    }

    function getStatusClass(status) {
      if (status === 'ok' || status === true) return 'ok';
      if (status === 'degraded') return 'warning';
      return 'error';
    }

    function getStatusText(status) {
      if (status === 'ok' || status === true) return '正常运行';
      if (status === 'degraded') return '服务降级';
      return '服务异常';
    }

    function renderService(name, data) {
      const status = data.ok === true ? 'ok' : (data.configured === false ? 'warning' : 'error');
      const icon = getServiceIcon(name);
      const statusText = getStatusText(data.ok);

      let detailsHtml = '';
      if (data.configured === false) {
        detailsHtml = `<div class="label">状态</div><div class="value">未配置</div>`;
      } else if (data.error) {
        detailsHtml = `
          <div class="label">状态</div><div class="value">${statusText}</div>
          <div class="error-msg">${data.error}</div>
        `;
      } else {
        detailsHtml = `<div class="label">状态</div><div class="value">${statusText}</div>`;
      }

      return `
        <div class="service-card ${status}">
          <div class="service-header">
            <div class="service-icon">${icon}</div>
            <div>
              <div class="service-title">${name.toUpperCase()}</div>
              <div class="service-status ${status}">${statusText}</div>
            </div>
          </div>
          <div class="service-details">
            ${detailsHtml}
          </div>
        </div>
      `;
    }

    async function checkHealth() {
      const btn = document.getElementById('btnRefresh');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="loading"></span> 检测中...';
      btn.disabled = true;

      try {
        const r = await fetch('/api/health');
        const data = await r.json();

        // Update overall status
        const overallStatus = data.status || 'error';
        const overallIcon = document.getElementById('statusIcon');
        const overallText = document.getElementById('statusText');
        const overallTime = document.getElementById('statusTime');
        const overallContainer = document.getElementById('overallStatus');

        overallContainer.className = 'overall-status';
        overallIcon.className = 'status-icon';
        overallText.className = 'status-text';

        if (overallStatus === 'ok') {
          overallIcon.textContent = '✓';
          overallIcon.classList.add('ok');
          overallText.textContent = '系统正常';
          overallText.classList.add('ok');
        } else if (overallStatus === 'degraded') {
          overallIcon.textContent = '⚠';
          overallIcon.classList.add('warning');
          overallText.textContent = '服务降级';
          overallText.classList.add('warning');
        } else {
          overallIcon.textContent = '✕';
          overallIcon.classList.add('error');
          overallText.textContent = '系统异常';
          overallText.classList.add('error');
        }

        overallTime.textContent = '上次更新: ' + new Date().toLocaleString('zh-CN');

        // Render services
        const servicesHtml = [
          renderService('mongodb', data.mongodb || {}),
          renderService('milvus', data.milvus || {}),
          renderService('minio', data.minio || {})
        ].join('');

        document.getElementById('servicesGrid').innerHTML = servicesHtml;

        // Update raw JSON
        document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);

      } catch (e) {
        const overallIcon = document.getElementById('statusIcon');
        const overallText = document.getElementById('statusText');
        const overallTime = document.getElementById('statusTime');

        overallIcon.textContent = '✕';
        overallIcon.className = 'status-icon error';
        overallText.textContent = '连接失败';
        overallText.className = 'status-text error';
        overallTime.textContent = '无法连接到服务器: ' + String(e);

        document.getElementById('servicesGrid').innerHTML = `
          <div class="service-card error" style="grid-column: 1 / -1;">
            <div class="service-header">
              <div class="service-icon">⚠️</div>
              <div>
                <div class="service-title">连接错误</div>
                <div class="service-status error">请求失败</div>
              </div>
            </div>
            <div class="service-details">
              <div class="error-msg">${String(e)}</div>
            </div>
          </div>
        `;
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    // Refresh button
    document.getElementById('btnRefresh').onclick = checkHealth;

    // Auto refresh toggle
    document.getElementById('btnAutoRefresh').onclick = function() {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
        this.innerHTML = '<span>▶️</span> 自动刷新';
        this.classList.remove('active');
      } else {
        checkHealth();
        autoRefreshInterval = setInterval(checkHealth, 5000);
        this.innerHTML = '<span>⏸️</span> 停止刷新';
        this.classList.add('active');
      }
    };

    // Raw JSON toggle
    document.getElementById('rawToggle').onclick = function() {
      const rawJson = document.getElementById('rawJson');
      this.classList.toggle('open');
      rawJson.classList.toggle('visible');
    };

    // Initial check
    checkHealth();
  </script>
</body>
</html>
